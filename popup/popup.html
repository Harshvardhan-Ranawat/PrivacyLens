<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrivacyLens Popup</title>
  <!-- Modern clean typography from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header Section -->
    <header class="header">
      <div class="logo-area">
        <svg class="shield-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="shieldGradPopup" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6" />
              <stop offset="100%" stop-color="#6366f1" />
            </linearGradient>
            <linearGradient id="swooshGrad1Popup" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#60a5fa" />
              <stop offset="100%" stop-color="#4f46e5" />
            </linearGradient>
            <linearGradient id="swooshGrad2Popup" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#3b82f6" />
              <stop offset="100%" stop-color="#7c3aed" />
            </linearGradient>
          </defs>
          <path fill="url(#shieldGradPopup)" d="M 50 12 C 64 16, 78 13, 78 13 C 78 13, 83 45, 78 62 C 73 78, 50 88, 50 88 C 50 88, 27 78, 22 62 C 17 45, 22 13, 22 13 C 22 13, 36 16, 50 12 Z" />
          <path fill="#0f172a" d="M 50 18 C 62 21, 74 19, 74 19 C 74 19, 78 45, 74 60 C 69 74, 50 83, 50 83 C 50 83, 31 74, 26 60 C 22 45, 26 19, 26 19 C 26 19, 38 21, 50 18 Z" />
          <path fill="url(#swooshGrad1Popup)" d="M 18 55 C 28 35, 55 28, 82 32 C 65 36, 45 46, 35 62 C 30 68, 22 64, 18 55 Z" />
          <path fill="url(#swooshGrad2Popup)" d="M 40 48 C 50 40, 62 36, 75 36 C 63 42, 52 50, 48 58 C 45 62, 42 58, 40 48 Z" />
        </svg>
        <h1 class="logo-title">PrivacyLens</h1>
      </div>
      <p class="logo-subtitle">Know what websites know about you.</p>
    </header>

    <hr class="divider">

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Section: Current Website -->
      <section class="info-section">
        <h2 class="section-label">Current Website</h2>
        <div class="website-card">
          <span class="globe-icon">🌐</span>
          <span id="website-name" class="website-name loading">Loading...</span>
        </div>
      </section>

      <!-- Section: Privacy Score -->
      <section class="info-section">
        <h2 class="section-label">Privacy Score</h2>
        <div class="score-card">
          <div class="score-radial">
            <svg viewBox="0 0 36 36" class="circular-chart">
              <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
              <path id="score-ring" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            </svg>
            <div class="score-inner">
              <span id="score-value" class="score-number">--</span>
              <span class="score-total">/100</span>
            </div>
          </div>
          <div id="score-status" class="score-status">Not analyzed</div>
        </div>
      </section>

      <!-- Section: Overall Privacy Risk -->
      <section class="info-section">
        <h2 class="section-label">Overall Privacy Risk</h2>
        <div class="risk-card">
          <span id="risk-level" class="risk-badge risk-unknown">Unknown</span>
        </div>
      </section>

      <!-- Section: Protection Controls -->
      <section class="info-section">
        <h2 class="section-label">Active Controls</h2>
        <div style="display: flex; flex-direction: column; gap: 10px; background-color: rgba(255, 255, 255, 0.015); border: 1px solid rgba(255, 255, 255, 0.02); padding: 12px; border-radius: 8px;">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <svg id="popup-active-shield-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; color: #10B981; transition: color 0.3s ease;">
                <defs>
                  <linearGradient id="popupActiveShieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="currentColor" />
                    <stop offset="100%" stop-color="currentColor" stop-opacity="0.8" />
                  </linearGradient>
                </defs>
                <path fill="url(#popupActiveShieldGrad)" d="M 50 12 C 64 16, 78 13, 78 13 C 78 13, 83 45, 78 62 C 73 78, 50 88, 50 88 C 50 88, 27 78, 22 62 C 17 45, 22 13, 22 13 C 22 13, 36 16, 50 12 Z" />
                <path fill="#0f172a" d="M 50 18 C 62 21, 74 19, 74 19 C 74 19, 78 45, 74 60 C 69 74, 50 83, 50 83 C 50 83, 31 74, 26 60 C 22 45, 26 19, 26 19 C 26 19, 38 21, 50 18 Z" />
                <path fill="currentColor" opacity="0.9" d="M 18 55 C 28 35, 55 28, 82 32 C 65 36, 45 46, 35 62 C 30 68, 22 64, 18 55 Z" />
                <path fill="currentColor" opacity="0.75" d="M 40 48 C 50 40, 62 36, 75 36 C 63 42, 52 50, 48 58 C 45 62, 42 58, 40 48 Z" />
              </svg>
              <span style="font-size: 13px; font-weight: 500; color: #e2e8f0; user-select: none;">Active Shields</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="popup-shields-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 8px;">
            <span style="font-size: 12px; color: #94a3b8;">Cookies & Tracking:</span>
            <button id="popup-purge-trackers-btn" type="button" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: background 0.2s;">
              Purge Trackers
            </button>
          </div>
        </div>
      </section>
    </main>

    <hr class="divider">

    <!-- Action Buttons -->
    <section class="actions">
      <button id="analyze-btn" class="btn btn-primary" type="button">
        Analyze Current Website
      </button>
      <button id="report-btn" class="btn btn-secondary" type="button">
        View Full Report
      </button>
    </section>

    <!-- Footer Section -->
    <footer class="footer">
      <span class="footer-text">PrivacyLens v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
